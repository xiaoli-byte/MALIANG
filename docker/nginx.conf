server {
    listen 5910;
    server_name localhost;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml application/javascript application/json;

    # Root directory (assets are in /bi/ subdirectory due to publicPath)
    root /usr/share/nginx/html;

    # Index file
    index index.html;

    # Handle SPA routing (hash mode - no server-side routing needed)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Assets with long cache headers
    location /bi/ {
        # Assets are fingerprinted, safe to cache long
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # API proxy (if needed in production)
    location /aisos/ {
        proxy_pass http://111.19.166.16:10628;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Disable access logs for static assets (optional, improves performance)
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;
}
